# fit_config.yaml -- defaults for fit_confusion.py (any CLI flag overrides these).

# analytic model + channels
model: karnesis        # karnesis (Eq.6, gwg-lineage) | robson (Eq.14, LEGWORK form)
channels: [A, E]       # fit A and E jointly (T carries ~no galactic confusion)

# preprocessing of the saved residual into the fit curve
window: 2000           # running-median window [bins]; match config.yaml icloop_kwargs.window_size
fmax_crop: 0.02        # crop residual to f <= this before median-filtering [Hz] (speed only)
conf_floor: 1.05       # fit only bins where median total > conf_floor * instrument. Lowered
                       # 1.1 -> 1.05 to admit weak-foreground (small-catalog) bins so they reach
                       # the >=10-bin minimum and fit at all. NOTE: this lets them fit; it does
                       # not fix the shape-parameter degeneracy for the smallest pops -- the
                       # deeper fix is fewer free params (frozen-shape / priors), not the floor.
fmin: null             # fit band low edge [Hz]; null -> inferred from the curve
fmax: null             # fit band high edge [Hz]; null -> inferred from the curve
n_per_decade: 250      # log-bins per decade for coarse-graining (decorrelates the curve)
kappa: 5.0             # within-bin exponential sigma-clip: reject periodogram bins > kappa*level
log_sigma: 0.05        # floor on the per-bin log10-PSD sigma used in the Gaussian likelihood

# emcee sampler (production settings; previously passed on the sbatch CLI)
nwalkers: 128
nsteps: 20000
nburn: 2500
nproc: null            # CPU workers; null = auto-detect (SLURM allocation / available cores); 1 = serial

# NOTE: 'out' (output dir) is intentionally NOT set here -- always pass it explicitly via the
# CLI --out, so results never land in a stale/implicit default location.
